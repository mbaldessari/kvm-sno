---
- name: Fetch Certs from remote node
  hosts: kvm
  become_user: michele
  become: true
  gather_facts: false
  vars:
    remote_ca_dir: "/tmp/kuemper-ca"
  tasks:
    - name: Fetch sno-ca folder from remote
      ansible.posix.synchronize:
        src: "{{ ca_folder }}"
        dest: "{{ remote_ca_dir }}"
        recursive: true
        mode: pull

    - name: Fetch local
      delegate_to: localhost
      ansible.builtin.shell: |
        set -e -o pipefail
        ls -1 *-kube | cut -f1 -d-
      args:
        chdir: "{{ remote_ca_dir }}/sno-ca"
      register: ca_files

    - name: Set sno cert var
      ansible.builtin.set_fact:
        sno_certs: "{{ ca_files.stdout_lines }}"

    - name: Fetch remote kubeconfig files
      ansible.builtin.fetch:
        src: "/home/michele/{{ item }}-kubeconfig"
        dest: "/home/michele/"
        flat: true
      with_items: "{{ sno_certs }}"
      failed_when: false
      register: kubeconfigs

    - name: Filter results
      ansible.builtin.set_fact:
        changed_snos: "{{ changed_snos | default([]) + [item.item] }}"
      with_items:
        - "{{ kubeconfigs.results }}"
      when:
        - item.changed

    - name: Set fact when empty
      ansible.builtin.set_fact:
        changed_snos: []
      when: changed_snos is not defined

    - name: Empty the firefox profile entirely
      tags:
        - pki
      ansible.builtin.shell: |
        set -e -o pipefail
        for nick in $(certutil -L -d sql:"{{ firefox_profile }}" | awk 'NR>4 {print substr($0,1,45)}' | sed 's/[[:space:]]*$//'); do
          echo "Deleting $nick"
          certutil -D -d sql:"{{ firefox_profile }}" -n "$nick"
        done
      args:
        chdir: "{{ ca_folder }}"

    - name: Purge all SNO certs from local firefox profile
      delegate_to: localhost
      ansible.builtin.shell: |
        set -e -o pipefail
        certutil -L -d sql:"{{ firefox_profile }}" | awk 'NR>4 {sub(/\s*[A-Z,]*\s*$/, ""); print}' | while IFS= read -r nick; do
          echo "Deleting $nick"
          certutil -D -n "$nick" -d sql:"{{ firefox_profile }}"
        done
      when: changed_snos | length > 0

    - name: Import all CAs into my firefox profile
      delegate_to: localhost
      ansible.builtin.shell: |
        set -e -o pipefail
        rm -f {{ remote_ca_dir }}/sno-ca/{{ item }}-cert*pem
        awk 'BEGIN {c=0;} /BEGIN CERTIFICATE/ {c++} {print > "{{ item }}-cert" c ".pem"}' < {{ remote_ca_dir }}/sno-ca/{{ item }}-ca-kube
        for i in {{ item }}-cert*; do
          if ! certutil -A -n "{{ item }}-$i-kube" -t "TC,C,C" -i "$i" -d sql:"{{ firefox_profile }}" 2>/dev/null; then
            serial=$(openssl x509 -in "$i" -noout -serial | cut -d= -f2)
            certutil -L -d sql:"{{ firefox_profile }}" | awk 'NR>4 {sub(/\s*[A-Z,]*\s*$/, ""); print}' | while IFS= read -r nick; do
              existing=$(certutil -L -d sql:"{{ firefox_profile }}" -n "$nick" -a 2>/dev/null | openssl x509 -noout -serial 2>/dev/null | cut -d= -f2)
              if [ "$existing" = "$serial" ]; then
                certutil -D -n "$nick" -d sql:"{{ firefox_profile }}"
              fi
            done
            certutil -A -n "{{ item }}-$i-kube" -t "TC,C,C" -i "$i" -d sql:"{{ firefox_profile }}"
          fi
        done
      args:
        chdir: "{{ remote_ca_dir }}/sno-ca"
      with_items: "{{ changed_snos }}"
      when: changed_snos | length > 0
