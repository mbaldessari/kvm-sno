---
- name: Restore SNO clusters from snapshot
  hosts: "{{ snos | default('snohosts') }}"
  gather_facts: false
  become: true
  strategy: ansible.builtin.free
  tasks:
    - name: Destroy VM
      ansible.builtin.command: virsh destroy "{{ item }}"
      with_items: "{{ inventory_hostname_short }}"
      failed_when: false

    - name: Restore snapshot
      ansible.builtin.command: >-
        virsh snapshot-revert "{{ item }}"
        --snapshotname "{{ item }}-post-install"
      with_items: "{{ inventory_hostname_short }}"

    - name: Start VM
      ansible.builtin.command: virsh start "{{ item }}"
      with_items: "{{ inventory_hostname_short }}"

    - name: Wait for node to be Ready
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG="{{ tempfolder }}/{{ item }}/auth/kubeconfig"
        {{ oc_bin }} get nodes | grep "{{ item }}" | grep -v NotReady
      with_items: "{{ inventory_hostname_short }}"
      register: cluster_info
      until: cluster_info is not failed
      retries: 100
      delay: 20

    - name: Approve any pending CSRs
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG="{{ tempfolder }}/{{ item }}/auth/kubeconfig"
        {{ oc_bin }} get csr -o go-template='{% raw %}{{range .items}}{{if not .status}}{{.metadata.name}}{{"\n"}}{{end}}{{end}}{% endraw %}' | xargs --no-run-if-empty {{ oc_bin }} adm certificate approve
      with_items: "{{ inventory_hostname_short }}"
      failed_when: false

    - name: Approve any pending CSRs (second pass)
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG="{{ tempfolder }}/{{ item }}/auth/kubeconfig"
        {{ oc_bin }} get csr -o go-template='{% raw %}{{range .items}}{{if not .status}}{{.metadata.name}}{{"\n"}}{{end}}{{end}}{% endraw %}' | xargs --no-run-if-empty {{ oc_bin }} adm certificate approve
      with_items: "{{ inventory_hostname_short }}"
      failed_when: false

    - name: Restart service-ca controller to regenerate serving certs
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG="{{ tempfolder }}/{{ item }}/auth/kubeconfig"
        {{ oc_bin }} delete pods -n openshift-service-ca --all
      with_items: "{{ inventory_hostname_short }}"
      failed_when: false

    - name: Wait for all clusteroperators to be available
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG="{{ tempfolder }}/{{ item }}/auth/kubeconfig"
        {{ oc_bin }} get clusteroperators -o json | jq -e '
          [.items[] | select(
            (.status.conditions[] | select(.type=="Available") | .status) != "True" or
            (.status.conditions[] | select(.type=="Degraded") | .status) != "False" or
            (.status.conditions[] | select(.type=="Progressing") | .status) != "False"
          )] | length == 0'
      with_items: "{{ inventory_hostname_short }}"
      register: co_status
      until: co_status is not failed
      retries: 100
      delay: 30

    - name: Wait for console to be up
      ansible.builtin.uri:
        url: https://console-openshift-console.apps.{{ item }}.{{ domain }}/
        validate_certs: false
        follow_redirects: all
      with_items: "{{ inventory_hostname_short }}"
      register: uri
      until: uri is not failed
      retries: 150
      delay: 30
