---
- name: Install Gitea and minio
  hosts: kvm
  gather_facts: false
  become: true
  tasks:
    - name: Download Fedora cloud image
      ansible.builtin.get_url:
        url: "{{ vm_image }}"
        dest: "/var/lib/libvirt/images/fedora-cloud-base.qcow2"
        mode: "0644"

    - name: Template cloud-init user-data
      ansible.builtin.template:
        src: ../templates/gitea-cloud-init.yaml.j2
        dest: "/tmp/gitea-cloud-init.yaml"
        mode: "0644"

    - name: Create disk from cloud image
      ansible.builtin.shell: |
        set -e -o pipefail
        qemu-img create -f qcow2 -b /var/lib/libvirt/images/fedora-cloud-base.qcow2 -F qcow2 \
          "/var/lib/libvirt/images/{{ item }}.qcow2" "{{ giteas[item].disk }}G"
      with_items: "{{ giteas | list }}"

    - name: Create extra disk for minio
      ansible.builtin.shell: |
        set -e -o pipefail
        qemu-img create -f qcow2 \
          "/var/lib/libvirt/images/{{ item }}-minio.qcow2" "{{ giteas[item].disk2 }}G"
      with_items: "{{ giteas | list }}"

    - name: Create Gitea VMs
      ansible.builtin.command: >-
        virt-install
        --name {{ item }}
        --cpu host-passthrough
        --hvm
        --virt-type kvm
        --arch {{ arch }}
        --os-variant fedora-unknown
        --import
        --network bridge="{{ bridge_interface }}",model=virtio,mac="{{ giteas[item].mac }}"
        --vcpus {{ giteas[item].cpus }},sockets=1,cores={{ giteas[item].cpus }},threads=1
        --ram {{ giteas[item].ram }}
        --disk "/var/lib/libvirt/images/{{ item }}.qcow2",format=qcow2,bus=virtio,cache={{ giteas[item].cache }},serial={{ giteas[item].wwn }}
        --disk "/var/lib/libvirt/images/{{ item }}-minio.qcow2",format=qcow2,bus=virtio,cache={{ giteas[item].cache2 }},serial={{ giteas[item].wwn2 }}
        --cloud-init user-data=/tmp/gitea-cloud-init.yaml,disable=on
        --graphics spice,listen=127.0.0.1
        --noautoconsole
        --boot menu=on,useserial=on,uefi
      with_items: "{{ giteas | list }}"
      retries: 2
      delay: 10
      register: vm_creation
      until: vm_creation is not failed

- name: Wait for Fedora boxes
  hosts: giteas
  gather_facts: false
  become: true
  vars:
    gitea_gpg: 7C9E68152594688862D62AF62D9AE806EC1592E2
    gitea_version: 1.21.5
    gitea_file: "gitea-{{ gitea_version }}-linux-amd64"
    gitea_url: "http://fw.int.rhx/{{ gitea_file }}"
    minio_file: "minio-20240418190919.0.0-1.x86_64.rpm"
    minio_client_file: "mcli-20240418164529.0.0-1.x86_64.rpm"
    minio_url: "http://fw.int.rhx/{{ minio_file }}"
    minio_client_url: "http://fw.int.rhx/{{ minio_client_file }}"
    repos:
      - upstream: https://github.com/mbaldessari/multicloud-gitops
        downstream: mcg
      - upstream: https://github.com/mbaldessari/clustergroup-chart
        downstream: clustergroup-chart
      - upstream: https://github.com/mbaldessari/acm-chart
        downstream: acm-chart
      - upstream: https://github.com/mbaldessari/argocd-tests
        downstream: argocd-tests
  tasks:
    - name: Wait for connection
      ansible.builtin.wait_for_connection:

    - name: Remove all existing repo files
      ansible.builtin.shell: rm -f /etc/yum.repos.d/*.repo

    - name: Copy local fedora repo config
      ansible.builtin.copy:
        src: /etc/yum.repos.d/fedora.repo
        dest: /etc/yum.repos.d/fedora.repo
        mode: "0644"

    - name: Update all packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install required packages
      ansible.builtin.dnf:
        name:
          - git
        state: present

    - name: Download minio binary
      ansible.builtin.get_url:
        url: "{{ minio_url }}"
        dest: "/tmp/{{ minio_file }}"
        mode: "0755"
      environment:
        https_proxy: "{{ https_proxy | default('') }}"

    - name: Download minio client binary
      ansible.builtin.get_url:
        url: "{{ minio_client_url }}"
        dest: "/tmp/{{ minio_client_file }}"
        mode: "0755"
      environment:
        https_proxy: "{{ https_proxy | default('') }}"

    - name: Install minio rpm
      ansible.builtin.shell: |
        dnf install -y "/tmp/{{ minio_file }}" "/tmp/{{ minio_client_file }}"

    - name: Add minio-user user
      ansible.builtin.shell: |
        set -e -o pipefail
        groupadd --system minio-user
        adduser --system --shell /bin/bash \
          --comment 'MINIO' \
          --gid minio-user --home-dir /home/minio-user --create-home \
          minio-user

    - name: Template /etc/default/minio
      ansible.builtin.template:
        src: ../templates/minio-default.j2
        dest: /etc/default/minio
        mode: "0640"
        owner: minio-user
        group: minio-user

    - name: Create disks and mount
      ansible.builtin.shell: |
        set -e
        mkfs.xfs /dev/vdb
        mkdir /mnt/data
        mount /dev/vdb /mnt/data
        mkdir -p /mnt/data/disk{1,2,3,4}
        chown -R minio-user: /mnt/data/disk{1,2,3,4}

    - name: Add vdb in fstab
      ansible.posix.mount:
        state: present
        path: /mnt/data
        src: /dev/vdb
        fstype: xfs

    - name: Create minio folders
      ansible.builtin.shell: |
        set -e -o pipefail
        mkdir /etc/minio
        chown -R minio-user:minio-user /etc/minio
        chmod 750 /etc/minio

    - name: Copy TLS certs for minio
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: /etc/minio/public.crt
        mode: "0640"
        owner: minio-user
        group: minio-user
      with_items:
        - /home/michele/ssl-ca/certs/gitea.ocplab.ocp.crt

    - name: Copy TLS certs for minio (2)
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: /etc/minio/private.key
        mode: "0640"
        owner: minio-user
        group: minio-user
      with_items:
        - /home/michele/ssl-ca/certs/gitea.ocplab.ocp.key

    # - name: Start minio
    #   ansible.builtin.systemd_service:
    #     name: minio
    #     state: started
    #     enabled: true
    #
    # - name: Init myminio
    #   ansible.builtin.shell: |
    #     set -e
    #     /usr/local/bin/mcli alias set {{ minio.org}} https://{{ minio.fqdn }}:9000 {{ minio.admin_user }} {{ minio.admin_pass }}
    #     /usr/local/bin/mcli admin user add {{ minio.org }} {{ minio.user }} {{ minio.pass }}
    #     /usr/local/bin/mcli mb --with-lock {{ minio.org }}/{{ minio.bucket }}
    #     /usr/local/bin/mcli admin user svcacct add {{ minio.org }} {{ minio.admin_user }} --name adminkey --description "adminkey" --access-key {{ minio.admin_access_key }} --secret-key {{ minio.admin_secret_key }}

    - name: Download gitea binary
      ansible.builtin.get_url:
        url: "{{ gitea_url }}"
        dest: "/tmp/{{ gitea_file }}"
        mode: "0755"
      environment:
        https_proxy: "{{ https_proxy | default('') }}"

    - name: Move git to proper path
      ansible.builtin.shell: |
        set -e -o pipefail
        mv /tmp/{{ gitea_file }} /usr/local/bin/gitea
        setcap CAP_NET_BIND_SERVICE=+eip /usr/local/bin/gitea

    - name: Add git user
      ansible.builtin.shell: |
        set -e -o pipefail
        groupadd --system git
        adduser --system --shell /bin/bash \
          --comment 'Git Version Control' \
          --gid git --home-dir /home/git --create-home \
          git

    - name: Create folders
      ansible.builtin.shell: |
        set -e -o pipefail
        mkdir -p /var/lib/gitea/{custom,data,log}
        chown -R git:git /var/lib/gitea/
        chmod -R 750 /var/lib/gitea/
        mkdir /etc/gitea
        chown root:git /etc/gitea
        chmod 770 /etc/gitea

    - name: Copy TLS certs on VM
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: /etc/gitea
        mode: "0640"
        owner: git
        group: git
      with_items:
        - /home/michele/ssl-ca/certs/gitea.ocplab.ocp.crt
        - /home/michele/ssl-ca/certs/gitea.ocplab.ocp.key

    - name: Template app.ini
      ansible.builtin.template:
        src: ../templates/gitea-app.ini
        dest: /etc/gitea/app.ini
        mode: "0644"
        owner: git

    - name: Get systemd service
      ansible.builtin.shell: |
        set -e -o pipefail
        curl -L -o /etc/systemd/system/gitea.service https://raw.githubusercontent.com/go-gitea/gitea/main/contrib/systemd/gitea.service
        systemctl daemon-reload

    - name: Start gitea service
      ansible.builtin.systemd:
        name: gitea
        state: started
        enabled: true

    - name: Give the service some time
      ansible.builtin.pause:
        seconds: 30

    - name: Create gitea admin user
      become: true
      become_user: git
      ansible.builtin.shell: |
        /usr/local/bin/gitea  -c /etc/gitea/app.ini admin user create \
          --username "{{ gitea.admin_user }}" --password "{{ gitea.admin_pass }}" --email yo@yo.yo --admin

    - name: Generate an access token for admin user
      become: true
      become_user: git
      ansible.builtin.shell: |
        set -e -o pipefail
        /usr/local/bin/gitea  -c /etc/gitea/app.ini admin user generate-access-token \
        --username "{{ gitea.admin_user }}" --scopes 'write:repository,write:admin,write:user' --raw
      register: gitea_token

    - name: Create secret-user
      ansible.builtin.uri:
        url: "{{ gitea.url }}/api/v1/admin/users"
        method: POST
        headers:
          Content-Type: application/json
          Authorization: token {{ gitea_token.stdout }}
        body_format: json
        body:
          email: "secret@secret.secret"
          full_name: "Secret User"
          login_name: "secret-user"
          must_change_password: false
          password: "{{ gitea.admin_pass }}"
          source_id: 0
          username: "secret-user"
          visibility: "private"
        return_content: true
        status_code: [201, 422]
      register: secret_user_out
      retries: 10
      delay: 10
      until: secret_user_out is not failed

    - name: Set secret user id fact
      ansible.builtin.set_fact:
        secret_uid: "{{ secret_user_out.json.id | int }}"

    - name: Generate an access token for secret-user
      become: true
      become_user: git
      ansible.builtin.shell: |
        set -e -o pipefail
        /usr/local/bin/gitea  -c /etc/gitea/app.ini admin user generate-access-token \
        --username "secret-user" --scopes 'write:repository,read:repository' --raw
      register: secret_user_token

    - ansible.builtin.include_tasks: gitea-migrate-repo.yml
      loop: "{{ repos }}"

    - name: Set ssh key facts
      ansible.builtin.set_fact:
        ssh_info:
          title: "My ssh key"
          key: "{{ sshkey }}"

    - name: Upload ssh key for user
      ansible.builtin.uri:
        url: "{{ gitea.url }}/api/v1/user/keys"
        method: POST
        headers:
          Content-Type: application/json
          Authorization: token {{ gitea_token.stdout }}
        body_format: json
        body: "{{ ssh_info }}"
        return_content: true
        status_code: 201
      register: ssh_out
      retries: 10
      delay: 10
      until: ssh_out is not failed

- name: Snapshot Gitea VMs
  hosts: kvm
  gather_facts: false
  become: true
  tasks:
    - name: Shut down VM for snapshot
      ansible.builtin.command: virsh shutdown "{{ item }}"
      with_items: "{{ giteas }}"

    - name: Wait for VM to be stopped
      ansible.builtin.shell: |
        set -e -o pipefail
        virsh list --all | grep -w "{{ item }}" | grep -v running
      register: stopped
      retries: 60
      delay: 10
      until: stopped is not failed
      with_items: "{{ giteas }}"

    - name: Take VM snapshot
      ansible.builtin.command: >-
        virsh snapshot-create-as "{{ item }}"
        --name "{{ item }}-post-install"
        --description "Post-install snapshot"
      with_items: "{{ giteas }}"

    - name: Start VM after snapshot
      ansible.builtin.command: virsh start "{{ item }}"
      with_items: "{{ giteas }}"
