---
- name: Test operator upgrades
  hosts: localhost
  connection: local
  gather_facts: false
  become: true
  become_user: michele
  vars:
    vp_operator_tempfolder: "~/sno-vp-operator"
    gitrepo_from: https://github.com/validatedpatterns/patterns-operator
    upgrade_from: "0.0.68"
    gitrepo_to: https://github.com/validatedpatterns/patterns-operator
    upgrade_to: "main"
    hub: sno3
    spoke: sno4
    from_version: 6.6.6
    to_version: 6.6.7
    registry: kuemper.int.rhx/bandini
    mcgtempfolder: "~/sno-mcg"
    #mcgtoken: "{{ lookup('file', '~/.mcg-private-token' | expanduser) }}"
    #mcggitrepo: https://github.com/mbaldessari/mcg-private
    mcggitrepo: https://github.com/validatedpatterns/multicloud-gitops
    #mcggitrepo_pat: "https://{{ mcgtoken }}@github.com/mbaldessari/mcg-private"
    mcggitbranch: main
    min_age_minutes: 5
  tasks:
    - name: Print versions
      ansible.builtin.debug:
        msg: "Testing upgrade on {{ hub }}-{{ spoke }} from {{ gitrepo_from }}:{{ upgrade_from }} to {{ gitrepo_to}}:{{ upgrade_to }}"

    - name: Check that all kubeconfig files exist
      ansible.builtin.stat:
        path: "~/{{ item }}-kubeconfig"
      with_items:
        - "{{ hub }}"
        - "{{ spoke }}"
      register: kubeconfig_files

    - name: Clone mcg git repo
      ansible.builtin.git:
        repo: "{{ mcggitrepo }}"
        version: "{{ mcggitbranch }}"
        dest: "{{ mcgtempfolder }}/multicloud-gitops"
        clone: true
      tags:
        - gitrepo

    # - name: Create private secret
    #   ansible.builtin.shell: |
    #     set -e
    #     export KUBECONFIG=~/{{ hub }}-kubeconfig
    #     cat > /tmp/vp-private.yaml<<EOF
    #     apiVersion: v1
    #     kind: Secret
    #     metadata:
    #       name: pat-secret
    #       namespace: patterns-operator
    #       labels:
    #         argocd.argoproj.io/secret-type: repository
    #     stringData:
    #       type: git
    #       url: "{{ mcggitrepo }}"
    #       # For GitHub PATs, the username can be anything (e.g., 'token'), 
    #       # but the password MUST be the PAT
    #       username: bandini
    #       password: "{{ mcgtoken }}"
    #     EOF
    #     oc apply -f /tmp/vp-private.yaml
    #   tags:
    #     - gitrepo

    - name: Verifying if files exists
      ansible.builtin.debug:
        msg: "File {{ item.stat.path }} exist"
      loop: "{{ kubeconfig_files.results }}"
      loop_control:
        label: "{{ item.stat.path }}"
      failed_when: not item.stat.exists

    - name: Delete temporary folder
      ansible.builtin.file:
        path: "{{ vp_operator_tempfolder }}"
        state: absent

    - name: Clone operator git repo using version "{{ upgrade_from }}"
      ansible.builtin.git:
        repo: "{{ gitrepo_from }}"
        version: "{{ upgrade_from }}"
        dest: "{{ vp_operator_tempfolder }}/patterns-operator"
        clone: true
      tags:
        - operator-install

    - name: Build and upload operator version {{ upgrade_from }} - {{ from_version }} to hub
      ansible.builtin.shell: |
        export KUBECONFIG=~/{{ hub }}-kubeconfig
        make VERSION={{ from_version }} UPLOADREGISTRY={{ registry }} USE_IMAGE_DIGESTS="" \
            CHANNELS=fast bundle generate docker-build docker-push bundle-build bundle-push catalog-build catalog-push catalog-install
      args:
        chdir: "{{ vp_operator_tempfolder }}/patterns-operator"
      tags:
        - operator-install

    - name: Wait for the catalog source to show up
      ansible.builtin.shell: |
        export KUBECONFIG=~/{{ hub }}-kubeconfig
        oc get -n openshift-marketplace packagemanifests -l "catalog=test-pattern-operator" --field-selector "metadata.name=patterns-operator"
      retries: 20
      delay: 10
      register: catalogsource_ret
      until: catalogsource_ret is not failed
      tags:
        - operator-install

    - name: Install the subscription and operator
      ansible.builtin.shell: |
        set -e
        export KUBECONFIG=~/{{ hub }}-kubeconfig
        cat > /tmp/vp-sub.yaml<<EOF
        ---
        apiVersion: v1
        kind: Namespace
        metadata:
          name: patterns-operator
        ---
        apiVersion: operators.coreos.com/v1
        kind: OperatorGroup
        metadata:
          name: patterns-operator-group
          namespace: patterns-operator
        spec:
        ---
        apiVersion: operators.coreos.com/v1alpha1
        kind: Subscription
        metadata:
          name: patterns-operator
          namespace: patterns-operator
          labels:
            operators.coreos.com/patterns-operator.openshift-operators: ""
        spec:
          channel: fast
          installPlanApproval: Automatic
          name: patterns-operator
          source: test-pattern-operator
          sourceNamespace: openshift-marketplace
        EOF
        oc apply -f /tmp/vp-sub.yaml
      tags:
        - operator-install

    - name: Wait for the operator to be installed
      ansible.builtin.shell: |
        export KUBECONFIG=~/{{ hub }}-kubeconfig
        oc get -n openshift-marketplace packagemanifests -l "catalog=test-pattern-operator" --field-selector "metadata.name=patterns-operator"  &> /dev/null
      retries: 20
      delay: 10
      register: operatorinstall_ret
      until: operatorinstall_ret is not failed
      tags:
        - operator-install

    - name: Wait for the installplan to be completed
      ansible.builtin.shell: |
        export KUBECONFIG=~/{{ hub }}-kubeconfig
        set -e -o pipefail
        oc get installplan -n patterns-operator $(oc get installplan -A |grep patterns-operator |awk '{ print $2 }') -o jsonpath='{.status.phase}'
      retries: 20
      delay: 10
      register: installplan_ret
      until: installplan_ret.stdout == "Complete"

    - name: Install pattern on HUB/{{ hub }}
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG=~/{{ hub }}-kubeconfig
        #./pattern.sh make TOKEN_SECRET=pat-secret TOKEN_NAMESPACE=patterns-operator install
        ./pattern.sh make install
      args:
        chdir: "{{ mcgtempfolder }}/multicloud-gitops"
      tags:
        - operator-install

    - name: Wait for ManagedCluster API to show up
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG=~/{{ hub }}-kubeconfig
        oc api-resources | grep cluster.open-cluster-management.io/v1 | grep ManagedCluster
      retries: 80
      delay: 20
      register: managedcluster_api
      until: managedcluster_api is not failed
      tags:
        - operator-install

    - name: Add {{ spoke }}
      ansible.builtin.set_fact:
        HUBCONFIG: "{{ '~/{{ hub }}-kubeconfig' | expanduser }}"
        REGIONCONFIG: "{{ '~/{{ spoke }}-kubeconfig' | expanduser }}"
      tags:
        - operator-install

    - name: Import {{ spoke }}
      ansible.builtin.import_role:
        name: acm_import
      retries: 10
      delay: 30
      register: acm1
      until: acm1 is not failed
      tags:
        - operator-install

    - name: Wait for namespaced argo on spoke
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG=~/{{ item }}-kubeconfig
        oc get argocds -A | grep multicloud-gitops-group-one
      args:
        chdir: "{{ mcgtempfolder }}/multicloud-gitops"
      retries: 100
      delay: 20
      register: argoregional
      until: argoregional is not failed
      with_items:
        - "{{ spoke }}"
      tags:
        - operator-install

    - name: Wait for all argo apps to be green on regional clusters
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG=~/{{ item }}-kubeconfig
        ./pattern.sh make argo-healthcheck
      args:
        chdir: "{{ mcgtempfolder }}/multicloud-gitops"
      retries: 100
      delay: 20
      register: argoregional
      until: argoregional is not failed
      with_items:
        - "{{ spoke }}"
      tags:
        - operator-install

    - name: Reset operator git repo to upgraded version
      ansible.builtin.git:
        repo: "{{ gitrepo_to }}"
        version: "{{ upgrade_to }}"
        dest: "{{ vp_operator_tempfolder }}/patterns-operator"
        force: true
      tags:
        - operator-upgrade

    - name: Prepare catalog/template.yaml
      ansible.builtin.shell: |
        cat > catalog/template.yaml<<EOF
        ---
        schema: olm.template.basic
        entries:
          - schema: olm.package
            name: patterns-operator
            defaultChannel: fast
          - schema: olm.channel
            package: patterns-operator
            name: fast
            entries:
            - name: patterns-operator.v{{ from_version }}
            - name: patterns-operator.v{{ to_version }}
              replaces: patterns-operator.v{{ from_version }}
          - schema: olm.bundle
            image: kuemper.int.rhx/bandini/patterns-operator-bundle:v{{ from_version }}
          - schema: olm.bundle
            image: kuemper.int.rhx/bandini/patterns-operator-bundle:v{{ to_version }}
        EOF
      args:
        chdir: "{{ vp_operator_tempfolder }}/patterns-operator"
      tags:
        - operator-upgrade

    - name: Build and upload upgraded operator version {{ upgrade_to }} - {{ to_version }}
      ansible.builtin.shell: |
        export KUBECONFIG=~/{{ hub }}-kubeconfig
        make VERSION={{ to_version }} UPLOADREGISTRY={{ registry }} USE_IMAGE_DIGESTS="" \
            CHANNELS=fast bundle generate docker-build docker-push bundle-build bundle-push catalog-build catalog-push catalog-install
      args:
        chdir: "{{ vp_operator_tempfolder }}/patterns-operator"
      tags:
        - operator-upgrade

    - name: Patch subscription to make sure we're using the right catalog source
      ansible.builtin.shell: |
        export KUBECONFIG=~/{{ hub }}-kubeconfig
        oc patch -n patterns-operator subscription.operators.coreos.com/patterns-operator --type=json -p '[{"op": "replace", "path": "/spec/source", "value": "test-pattern-operator"}]'
      args:
        chdir: "{{ vp_operator_tempfolder }}/patterns-operator"
      tags:
        - operator-upgrade

    - name: Wait for all argo apps to be green on all clusters
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG=~/{{ item }}-kubeconfig
        ./pattern.sh make argo-healthcheck
      args:
        chdir: "{{ mcgtempfolder }}/multicloud-gitops"
      retries: 10
      delay: 20
      register: allargos
      until: allargos is not failed
      with_items:
        - "{{ hub }}"
        - "{{ spoke }}"
      tags:
        - operator-upgrade

    - name: Check that pattern-operator controller has completed reconciliation
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG=~/{{ hub }}-kubeconfig
        oc logs -n patterns-operator $(oc get pods -n patterns-operator -l control-plane=controller-manager -o jsonpath='{.items[0].metadata.name}') -c manager | grep "Reconcile complete"
      retries: 20
      delay: 15
      register: reconcile_ret
      until: reconcile_ret is not failed
      tags:
        - operator-upgrade

    - name: Check for nil pointer dereference in pattern-operator controller logs
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG=~/{{ hub }}-kubeconfig
        POD=$(oc get pods -n patterns-operator -l control-plane=controller-manager -o jsonpath='{.items[0].metadata.name}')
        LOGS=$(oc logs -n patterns-operator "${POD}" -c manager 2>&1)
        if echo "${LOGS}" | grep -q "nil pointer dereference"; then
          echo "ERROR: Found nil pointer dereference in controller logs:"
          echo "${LOGS}" | grep -B2 -A5 "nil pointer dereference"
          exit 1
        fi
        echo "No nil pointer dereference found in controller logs"
      register: nil_pointer_ret
      tags:
        - operator-upgrade
        - post-checks

    - name: Check that ArgoCD objects are not being recreated on {{ item }}
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG=~/{{ item }}-kubeconfig
        NOW=$(date +%s)
        ERRORS=""
        while IFS= read -r line; do
          NAME=$(echo "${line}" | awk '{print $1}')
          NS=$(echo "${line}" | awk '{print $2}')
          CREATED=$(echo "${line}" | awk '{print $3}')
          CREATED_EPOCH=$(date -d "${CREATED}" +%s)
          AGE_MINUTES=$(( (NOW - CREATED_EPOCH) / 60 ))
          if [ "${AGE_MINUTES}" -lt "{{ min_age_minutes }}" ]; then
            ERRORS="${ERRORS}ArgoCD ${NS}/${NAME} is only ${AGE_MINUTES} minutes old (created: ${CREATED})\n"
          fi
        done < <(oc get argocds -A -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.metadata.namespace}{" "}{.metadata.creationTimestamp}{"\n"}{end}')
        while IFS= read -r line; do
          NAME=$(echo "${line}" | awk '{print $1}')
          NS=$(echo "${line}" | awk '{print $2}')
          CREATED=$(echo "${line}" | awk '{print $3}')
          CREATED_EPOCH=$(date -d "${CREATED}" +%s)
          AGE_MINUTES=$(( (NOW - CREATED_EPOCH) / 60 ))
          if [ "${AGE_MINUTES}" -lt "{{ min_age_minutes }}" ]; then
            ERRORS="${ERRORS}Application ${NS}/${NAME} is only ${AGE_MINUTES} minutes old (created: ${CREATED})\n"
          fi
        done < <(oc get applications.argoproj.io -A -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.metadata.namespace}{" "}{.metadata.creationTimestamp}{"\n"}{end}')
        if [ -n "${ERRORS}" ]; then
          echo -e "ERROR: The following objects were created less than {{ min_age_minutes }} minutes ago:\n${ERRORS}"
          exit 1
        fi
        echo "All ArgoCD and Application objects are older than {{ min_age_minutes }} minutes"
      with_items:
        - "{{ hub }}"
        - "{{ spoke }}"
      register: argocd_age_ret
      tags:
        - operator-upgrade
        - post-checks
