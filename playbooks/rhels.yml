---
- name: Install RHEL box
  hosts: kvm
  gather_facts: false
  become: true
  tasks:
    - name: Template kickstart file to the firewall where it is hosted
      ansible.builtin.template:
        src: ../templates/rhel-ks.yaml.j2
        dest: "/var/www/html/rhel.ks"
        mode: "0644"
      delegate_to: fw

    - name: Set bootloader fact
      ansible.builtin.set_fact:
        bootlines: "{{ bootlines | default({}) | combine({item: '--boot menu=on,useserial=on,uefi'}) }}"
      with_items: "{{ rhels }}"

    - name: Create RHEL VMs
      ansible.builtin.command: >-
        virt-install
        --name {{ item }}
        --hvm
        --virt-type kvm
        --cpu host-passthrough
        --arch {{ arch }}
        --location {{ rhel_isos[rhels[item].version] }}
        --os-variant {{ rhel_variants[rhels[item].version] }}
        --network bridge="{{ bridge_interface }}",mac="{{ mac_prefix }}:{{ rhels[item].mac_nr }}"
        --vcpus {{ rhels[item].cpus }},sockets=1,cores={{ rhels[item].cpus }},threads=1  
        --ram {{ rhels[item].ram }}
        --disk pool={{ rhel_pool }},size={{ rhels[item].disk }},format=qcow2,bus=scsi,cache={{ rhels[item].cache }},wwn={{ rhels[item].wwn }}
        --check disk_size=off
        --graphics spice,listen=127.0.0.1
        --noautoconsole
        --extra-args "inst.ks=http://fw.int.rhx/rhel.ks"
        {{ bootlines[item] }}
      with_items: "{{ rhels }}"
      retries: 2
      delay: 10
      register: vm_creation
      until: vm_creation is not failed

    - name: Wait for vm to be stopped
      ansible.builtin.shell: |
        set -e -o pipefail
        virsh list --all | grep -w "{{ item }}" | grep -v running
      register: running
      retries: 100
      delay: 10
      until: running is not failed
      with_items: "{{ rhels }}"

    - name: Start "{{ item }}"
      ansible.builtin.command: |
        virsh start "{{ item }}"
      with_items: "{{ rhels }}"

- name: Wait for RHEL boxes
  hosts: rhels
  gather_facts: false
  become: true
  tasks:
    - name: Wait for boxes
      ansible.builtin.wait_for_connection:

- name: Snapshot RHEL VMs
  hosts: kvm
  gather_facts: false
  become: true
  tasks:
    - name: Shut down VM for snapshot
      ansible.builtin.command: virsh shutdown "{{ item }}"
      with_items: "{{ rhels }}"

    - name: Wait for VM to be stopped
      ansible.builtin.shell: |
        set -e -o pipefail
        virsh list --all | grep -w "{{ item }}" | grep -v running
      register: stopped
      retries: 60
      delay: 10
      until: stopped is not failed
      with_items: "{{ rhels }}"

    - name: Take VM snapshot
      ansible.builtin.command: >-
        virsh snapshot-create-as "{{ item }}"
        --name "{{ item }}-post-install"
        --description "Post-install snapshot"
      with_items: "{{ rhels }}"

    - name: Start VM after snapshot
      ansible.builtin.command: virsh start "{{ item }}"
      with_items: "{{ rhels }}"
