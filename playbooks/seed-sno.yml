- name: Snapshot SNO cluster seed
  hosts: "{{ snos | default('snohosts') }}"
  gather_facts: false
  become: true
  vars:
    # We do one node at the time
    my_node: "{{ snos | first }}"
    kfile: "/home/michele/{{ my_node }}-kubeconfig"
  tasks:
    - name: debug
      ansible.builtin.debug:
        msg: "{{ tempfolder }} - {{ my_node }}"

    - name: Check if Shared Container Storage is already applied and active
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kfile }}"
        api_version: machineconfiguration.openshift.io/v1
        kind: MachineConfig
        name: 01-container-shared-storage
      register: mc_check
    
    - name: Check if MachineConfigPool is already Updated
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kfile }}"
        api_version: machineconfiguration.openshift.io/v1
        kind: MachineConfigPool
        name: master
      register: mcp_check
    
    - name: Set skip flag if already configured
      set_fact:
        skip_storage_reboot: "{{ mc_check.resources | length > 0 and mcp_check.resources[0].status.phase == 'Updated' }}"    

    - name: Define the storage.conf content
      ansible.builtin.set_fact:
        storage_conf_raw: |
          [storage]
          driver = "overlay"

          [storage.options]
          additionalimagestores = [
            "/var/lib/shared"
          ]
          [storage.options.overlay]
          mountopt = "metacopy=on"

    - name: Apply MachineConfig for Shared Container Storage
      when: not skip_storage_reboot | bool
      kubernetes.core.k8s:
        kubeconfig: "{{ kfile }}"
        state: present
        definition:
          apiVersion: machineconfiguration.openshift.io/v1
          kind: MachineConfig
          metadata:
            labels:
              machineconfiguration.openshift.io/role: master
            name: 01-container-shared-storage
          spec:
            config:
              ignition:
                version: 3.2.0
              storage:
                files:
                - contents:
                    # This is the URL-encoded version of the storage.conf file
                    source: "data:,{{ storage_conf_raw | urlencode }}"
                  mode: 420
                  overwrite: true
                  path: /etc/containers/storage.conf
    
    - name: Wait for MachineConfigPool to start updating
      when: not skip_storage_reboot | bool
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kfile }}"
        api_version: machineconfiguration.openshift.io/v1
        kind: MachineConfigPool
        name: master
      register: mcp_status
      until: 
        - mcp_status.resources[0].status.updatingConfig is defined
        - mcp_status.resources[0].status.phase == "Updating"
      retries: 20
      delay: 10
      ignore_errors: yes # SNO might drop the connection mid-update as it reboots
    
    - name: Wait for SNO Node to finish reboot and reach Updated state
      when: not skip_storage_reboot | bool
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kfile }}"
        api_version: machineconfiguration.openshift.io/v1
        kind: MachineConfigPool
        name: master
      register: mcp_result
      until:
        - mcp_result.resources[0].status.updatedMachineCount == 1
        - mcp_result.resources[0].status.unavailableMachineCount == 0
        - mcp_result.resources[0].status.phase == "Updated"
      retries: 60  # Give it 10 minutes (60 * 10s) to reboot and stabilize
      delay: 10

    - name: Template Seedgenerator
      delegate_to: localhost
      ansible.builtin.template:
        src: ../templates/seedgenerator.yaml
        dest: "{{ tempfolder }}/{{ my_node }}/seedgenerator.yaml"
        mode: "0640"

    - name: Template Seedoperator
      delegate_to: localhost
      ansible.builtin.template:
        src: ../templates/seedoperator.yaml
        dest: "{{ tempfolder }}/{{ my_node }}/seedoperator.yaml"
        mode: "0640"

    - name: Apply seed operator stuff
      delegate_to: localhost
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG="{{ kfile }}"
        oc apply -f "{{ tempfolder }}/{{ my_node }}/seedoperator.yaml" 
      
    - name: Wait for Lifecycle Agent Operator to be fully installed
      block:
        - name: Get the name of the current CSV from the Subscription
          kubernetes.core.k8s_info:
            api_version: operators.coreos.com/v1alpha1
            kind: Subscription
            name: openshift-lifecycle-agent-subscription
            namespace: openshift-lifecycle-agent
            kubeconfig: "{{ kfile }}"
          register: lca_subscription
          until: lca_subscription.resources[0].status.currentCSV is defined
          retries: 30
          delay: 10
    
        - name: Wait until CSV phase is Succeeded
          kubernetes.core.k8s_info:
            api_version: operators.coreos.com/v1alpha1
            kind: ClusterServiceVersion
            name: "{{ lca_subscription.resources[0].status.currentCSV }}"
            namespace: openshift-lifecycle-agent
            kubeconfig: "{{ kfile }}"
          register: lca_csv
          until: 
            - lca_csv.resources | length > 0
            - lca_csv.resources[0].status.phase == "Succeeded"
          retries: 50
          delay: 10
    
        - name: Confirm the Lifecycle Agent controller pods are ready
          kubernetes.core.k8s_info:
            api_version: apps/v1
            kind: Deployment
            name: lifecycle-agent-controller-manager
            namespace: openshift-lifecycle-agent
            kubeconfig: "{{ kfile }}"
          register: lca_deployment
          until:
            - lca_deployment.resources[0].status.readyReplicas is defined
            - lca_deployment.resources[0].status.readyReplicas >= 1
          retries: 20
          delay: 10

    - name: Apply seed generator stuff
      delegate_to: localhost
      ansible.builtin.shell: |
        set -e -o pipefail
        export KUBECONFIG="{{ kfile }}"
        oc apply -f "{{ tempfolder }}/{{ my_node }}/seedgenerator.yaml" 
      
    - name: Monitor SeedGenerator for completion
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kfile }}"
        api_version: lca.openshift.io/v1alpha1
        kind: SeedGenerator
        name: seedimage
      register: seed_gen
      # We retry until it is either Completed or Failed
      until: 
        - seed_gen.resources | length > 0
        - >-
          (seed_gen.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'SeedGenCompleted') | map(attribute='status') | first | default('False') == 'True') or
          (seed_gen.resources[0].status.conditions | default([]) | selectattr('type', 'equalto', 'SeedGenFailed') | map(attribute='status') | first | default('False') == 'True')
      retries: 60  # Seed generation can take 10-20 minutes depending on image size/network
      delay: 30
    
    - name: Fail if SeedGenerator failed
      ansible.builtin.fail:
        msg: "Seed generation failed! Check logs: oc logs -n openshift-lifecycle-agent -l app.kubernetes.io/name=lifecycle-agent"
      when: >-
        seed_gen.resources[0].status.conditions | selectattr('type', 'equalto', 'SeedGenFailed') | map(attribute='status') | first | default('False') == 'True'
    
    - name: Success message
      ansible.builtin.debug:
        msg: "Seed image has been successfully pushed to {{ seed_gen.resources[0].spec.seedImage }}"
